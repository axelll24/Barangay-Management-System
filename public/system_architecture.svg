<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" />
  
  <!-- Boxes -->
  <!-- Client Side -->
  <rect x="50" y="50" width="200" height="300" rx="20" fill="#ffffff" stroke="#141414" stroke-width="4" />
  <text x="150" y="80" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#141414">FRONTEND</text>
  <text x="150" y="110" font-family="Arial" font-size="14" text-anchor="middle" fill="#64748b">(React + Vite)</text>
  
  <rect x="70" y="140" width="160" height="40" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="2" />
  <text x="150" y="165" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#3b82f6">User Interface</text>
  
  <rect x="70" y="200" width="160" height="40" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="2" />
  <text x="150" y="225" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#3b82f6">State Management</text>
  
  <rect x="70" y="260" width="160" height="40" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="2" />
  <text x="150" y="285" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#3b82f6">API Interaction</text>

  <!-- Service Layer (Cloud) -->
  <rect x="350" y="50" width="400" height="300" rx="20" fill="#ffffff" stroke="#141414" stroke-width="4" />
  <text x="550" y="80" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#141414">BACKEND & DATABASE</text>
  <text x="550" y="110" font-family="Arial" font-size="14" text-anchor="middle" fill="#64748b">(Firebase + Gemini API)</text>

  <!-- Auth -->
  <rect x="380" y="140" width="150" height="80" rx="10" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="2" />
  <text x="455" y="175" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#f59e0b">Firebase Auth</text>
  <text x="455" y="195" font-family="Arial" font-size="10" text-anchor="middle" fill="#f59e0b">(Login/Identity)</text>

  <!-- Firestore -->
  <rect x="570" y="140" width="150" height="150" rx="10" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="2" />
  <text x="645" y="200" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#ef4444">Cloud Firestore</text>
  <text x="645" y="220" font-family="Arial" font-size="10" text-anchor="middle" fill="#ef4444">(NoSQL Database)</text>

  <!-- Gemini -->
  <rect x="380" y="240" width="150" height="80" rx="10" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="2" />
  <text x="455" y="275" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#8b5cf6">Gemini AI</text>
  <text x="455" y="295" font-family="Arial" font-size="10" text-anchor="middle" fill="#8b5cf6">(ID Verification)</text>

  <!-- Arrows -->
  <!-- Frontend to Auth -->
  <path d="M 250 180 L 380 180" stroke="#141414" stroke-width="3" marker-end="url(#arrowhead)" />
  <!-- Frontend to Firestore -->
  <path d="M 250 250 L 570 250" stroke="#141414" stroke-width="3" marker-end="url(#arrowhead)" />
  <!-- Frontend to Gemini -->
  <path d="M 250 280 L 380 280" stroke="#141414" stroke-width="3" marker-end="url(#arrowhead)" />

  <!-- Arrowhead Marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#141414" />
    </marker>
  </defs>
</svg>
